server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text-based assets. WASM is already compressed; let the browser
    # use it as-is.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Bare / -> /cnvlens/
    location = / {
        return 302 /cnvlens/;
    }

    # Hashed Vite assets - immutable cache + COOP/COEP.
    location /cnvlens/assets/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Pyodide runtime (.wasm, .js, stdlib zip) - immutable cache + COOP/COEP.
    location /cnvlens/pyodide/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA entry point - never cache.
    location = /cnvlens/index.html {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Everything else under /cnvlens/ - SPA fallback.
    # add_header does NOT inherit between location blocks in nginx, so
    # COOP/COEP are repeated in every block that needs them.
    location /cnvlens/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        try_files $uri $uri/ /cnvlens/index.html;
    }
}
